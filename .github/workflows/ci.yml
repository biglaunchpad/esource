# Deploys the bundle on each trigger:
#   pull request  -> dev    (validate + deploy)
#   merge to main -> test   (deploy + run setup)
#   tag vX.Y.Z    -> prod   (deploy + run setup; gate with a required reviewer on the prod env)
#
# Auth: service principal OAuth (M2M). Set these in the repo
# (Settings -> Secrets and variables -> Actions):
#   - variable DATABRICKS_HOST          workspace URL
#   - variable DATABRICKS_CLIENT_ID     service principal Application ID
#   - secret   DATABRICKS_CLIENT_SECRET an OAuth secret generated for that SP
# The same client ID is passed as run_as for test/prod.

name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

env:
  DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
  DATABRICKS_CLIENT_ID: ${{ vars.DATABRICKS_CLIENT_ID }}
  DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}

jobs:
  dev:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      - run: databricks bundle validate -t dev
      - run: databricks bundle deploy -t dev

  test:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: test
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      - run: databricks bundle deploy -t test --var "service_principal_id=${{ vars.DATABRICKS_CLIENT_ID }}"
      - run: databricks bundle run iedr_setup -t test --var "service_principal_id=${{ vars.DATABRICKS_CLIENT_ID }}"

  prod:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      - run: databricks bundle deploy -t prod --var "service_principal_id=${{ vars.DATABRICKS_CLIENT_ID }}"
      - run: databricks bundle run iedr_setup -t prod --var "service_principal_id=${{ vars.DATABRICKS_CLIENT_ID }}"
