# Deploys the bundle on each trigger:
#   pull request -> dev    (validate + deploy so the change can be tried)
#   merge to main -> test  (deploy + run setup)
#   tag vX.Y.Z   -> prod   (deploy + run setup, gated by the prod environment)
#
# Auth uses GitHub OIDC, so there are no tokens in the repo. Set these once:
#   - repo/Environment variable DATABRICKS_HOST            (workspace URL)
#   - repo/Environment secret   DATABRICKS_CLIENT_ID       (service principal UUID)
#   - bundle var service_principal_id                      (same SP app ID, for run_as)
# and add a GitHub Actions federation policy on the service principal with subject
#   repo:biglaunchpad/esource:environment:<dev|test|prod>

name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  id-token: write
  contents: read

env:
  DATABRICKS_AUTH_TYPE: github-oidc
  DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
  DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}

jobs:
  dev:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      - run: databricks bundle validate -t dev
      - run: databricks bundle deploy -t dev

  test:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: test
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      - run: databricks bundle deploy -t test --var "service_principal_id=${{ vars.SERVICE_PRINCIPAL_ID }}"
      - run: databricks bundle run iedr_setup -t test --var "service_principal_id=${{ vars.SERVICE_PRINCIPAL_ID }}"

  prod:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: prod          # add a required reviewer here for an approval gate
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      - run: databricks bundle deploy -t prod --var "service_principal_id=${{ vars.SERVICE_PRINCIPAL_ID }}"
      - run: databricks bundle run iedr_setup -t prod --var "service_principal_id=${{ vars.SERVICE_PRINCIPAL_ID }}"
